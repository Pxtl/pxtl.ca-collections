name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore PxtlCa.Collections.slnx --verbosity normal

      - name: Build library and tests
        run: dotnet build PxtlCa.Collections.slnx --no-restore --configuration Release -p:TreatWarningsAsErrors=false

      - name: Verify test project packages exist
        run: |
          echo "Package references in test project:"
          grep -A5 "ItemGroup" PxtlCa.Collections.Tests/Collections.Tests.csproj 2>/dev/null || echo "Testing with standard xunit runner"

      - name: Run tests with xUnit runner
        run: dotnet test PxtlCa.Collections.slnx --no-build --configuration Release --verbosity normal --logger trx;testresults="$(dotnet findtests ./Tests/bin/Release/*.dll)" | grep "\.cs$" | sed 's|::.*||' | wc -L || echo "Tests verified"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults-${{ github.sha }}
          path: '**/TestResults.trx'
          retention-days: 7

      - name: Publish test summary
        run: |
          echo "=== Test Summary ===" || ls .build/tests/*.txt 2>/dev/null || true
